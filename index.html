<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
<div class="global-toggle-row">
  <button id="globalToggleBtn" class="btn-disabled" data-tooltip="Don't forget to RELOAD the page to capture new WebSockets. The extension only intercepts connections opened AFTER it was enabled.">App: Disabled</button>
</div>
<div class="controls">
  <select id="socketSelect"><option value="">--- Choose a socket ---</option></select>
</div>

<div class="action-row">
  <div class="intercept-panel-row">
    <div class="toggle-container">
      <label class="switch">
        <input type="checkbox" id="chkOut" disabled>
        <span class="slider"></span>
      </label>
      <span class="toggle-label" id="lblOut" data-tooltip="Intercept outgoing data (Client ➔ Server)">OUT interception</span>
    </div>

    <div class="toggle-container">
      <label class="switch">
        <input type="checkbox" id="chkIn" disabled>
        <span class="slider"></span>
      </label>
      <span class="toggle-label" id="lblIn" data-tooltip="Intercept incoming data (Server ➔ Client)">IN interception</span>
    </div>
  </div>
</div>

<div class="textarea-container">
  <textarea id="payloadArea" placeholder="Message data"></textarea>
  <div id="clearPayloadBtn" class="clear-input-btn" title="Clear message">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="15" y1="9" x2="9" y2="15"></line>
      <line x1="9" y1="9" x2="15" y2="15"></line>
    </svg>
  </div>
</div>
<button id="sendBtn" disabled>Send</button>

<div class="queue-bar">
  <div class="queue-counter" id="queueLabel">Intercepted messages in queue: 0</div>
  <div class="queue-actions">
    <button id="qForwardBtn" class="btn-q" disabled>Forward</button>
    <button id="qDropBtn" class="btn-q" disabled>Drop</button>
  </div>
</div>

<h3 style="margin: 5px 0; font-size: 14px; flex-shrink: 0;">Logs (Filtered)</h3>
<div id="log"></div>

<div class="logs-actions-row">
  <div class="search-wrapper">
    <input type="text" id="logSearchInput" placeholder="Search" disabled />
    <button id="clearSearchBtn" style="display: none;">&times;</button>
  </div>
  <button id="clearLogsBtn" disabled>Clear Logs</button>
</div>

<script type="module" src="core/app.js"></script>
</body>
</html>
